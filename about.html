<!DOCTYPE html>
<html>
<head>
<title>About - Smart Attendance</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family: 'Segoe UI', sans-serif;
    margin:0;
    padding:0;
    text-align:center;
    background: linear-gradient(-45deg,#84fab0,#8fd3f4,#a18cd1,#fbc2eb);
    background-size:400% 400%;
    animation: bg 10s infinite alternate;
}

@keyframes bg{
0%{background-position:0% 50%;}
100%{background-position:100% 50%;}
}

.container{
    margin:40px auto;
    padding:25px;
    width:90%;
    max-width:500px;
    background:rgba(255,255,255,0.25);
    backdrop-filter: blur(12px);
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
    color:#fff;
    margin-bottom:10px;
}

p{
    color:#fff;
    font-size:15px;
    line-height:1.6;
}

.dev-list{
    margin-top:20px;
}

.dev{
    background:rgba(255,255,255,0.3);
    margin:8px 0;
    padding:10px;
    border-radius:8px;
    color:#222;
    font-weight:bold;
    transition:0.3s;
}

.dev:hover{
    background:#fff;
    transform:scale(1.05);
}

a{
    display:inline-block;
    margin-top:20px;
    padding:12px 18px;
    background:#222;
    color:white;
    text-decoration:none;
    border-radius:8px;
    transition:0.3s;
}

a:hover{
    background:#000;
}
</style>
</head>

<body>

<div class="container">

<h1>📘 About Smart Attendance</h1>

<p>
This Smart Attendance System helps teachers easily mark attendance using camera,
store records in Firebase, and download reports in Excel and PDF format.
</p>

</html>
